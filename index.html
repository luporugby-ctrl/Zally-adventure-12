    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050d;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
    }

    #wrapper {
      position: relative;
      width: 800px;
      height: 600px;
      flex-shrink: 0;
    }

    @media (max-width: 820px) {
      #wrapper {
        width: 100vw;
        height: calc(100vw * 0.75);
      }
      canvas { width: 100% !important; height: auto !important; }
    }

    canvas {
      display: block;
      border: 3px solid #ff6600;
      box-shadow:
        0 0 20px rgba(255,102,0,0.8),
        0 0 60px rgba(255,102,0,0.3),
        inset 0 0 20px rgba(255,102,0,0.05);
    }

    /* ─── MODAL OVERLAY ─── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,5,13,0.93);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 50;
      overflow-y: auto;
      padding: 10px 0;
    }
    #overlay.active { display: flex; }

    .modal {
      background: #0d0d1f;
      border: 3px solid #ff6600;
      box-shadow:
        0 0 30px rgba(255,102,0,0.5),
        inset 0 0 30px rgba(255,102,0,0.04);
      padding: 22px 26px 26px;
      width: 756px;
      max-width: calc(100vw - 10px);
      position: relative;
    }

    .modal-badge {
      display: inline-block;
      background: #ff6600;
      color: #000;
      font-size: 7px;
      padding: 5px 12px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .modal-title {
      font-size: 13px;
      color: #ccff00;
      margin-bottom: 12px;
      line-height: 1.6;
      text-shadow: 0 0 12px rgba(204,255,0,0.5);
    }

    .modal-scenario {
      font-size: 6.5px;
      color: #aaa;
      line-height: 2;
      margin-bottom: 16px;
      border-left: 3px solid #ff6600;
      padding-left: 12px;
    }

    .modal-question {
      font-size: 7.5px;
      color: #fff;
      line-height: 1.9;
      margin-bottom: 16px;
    }

    .option-btn {
      display: block;
      width: 100%;
      background: #13132a;
      border: 2px solid #2a2a50;
      color: #ccc;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      text-align: left;
      line-height: 2;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #ff6600;
      color: #fff;
      background: #1a1a38;
    }
    .option-btn.correct {
      border-color: #ccff00;
      color: #ccff00;
      background: #0d1a00;
      box-shadow: 0 0 12px rgba(204,255,0,0.25);
    }
    .option-btn.wrong {
      border-color: #ff0044;
      color: #ff4466;
      background: #1a0010;
    }
    .option-btn:disabled { cursor: default; }

    .hint-box {
      background: #0a1400;
      border: 2px solid #ccff00;
      border-left: 5px solid #ccff00;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: 6.5px;
      color: #ccff00;
      line-height: 2;
    }

    .unlock-box {
      background: #110a00;
      border: 2px solid #ff6600;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 6.5px;
      color: #ffbb66;
      line-height: 2;
    }
    .unlock-box .unlock-label {
      color: #ccff00;
      display: block;
      margin-bottom: 10px;
    }
    .unlock-box .prompt-text {
      color: #ffcc88;
      display: block;
      font-size: 6px;
      line-height: 2.2;
      border-left: 3px solid #ff6600;
      padding-left: 12px;
    }

    .play-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #ff6600 0%, #cc4400 100%);
      color: #000;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 11px;
      padding: 16px;
      margin-top: 18px;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 25px rgba(255,102,0,0.6), 0 4px 0 #882200;
      transition: all 0.15s;
      position: relative;
      top: 0;
    }
    .play-btn:hover {
      background: linear-gradient(135deg, #ccff00 0%, #88bb00 100%);
      box-shadow: 0 0 35px rgba(204,255,0,0.7), 0 4px 0 #446600;
      top: -2px;
    }
    .play-btn:active { top: 2px; box-shadow: 0 1px 0 #882200; }

    /* ─── HUD ─── */
    #hud {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: none;
    }
    #hud.active { display: block; }

    .hud-top {
      position: absolute;
      top: 12px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px;
    }
    .hud-score { font-size: 8px; color: #ccff00; text-shadow: 0 0 8px rgba(204,255,0,0.6); }
    .hud-level { font-size: 8px; color: #ff6600; text-shadow: 0 0 8px rgba(255,102,0,0.6); }

    .hud-bars {
      position: absolute;
      bottom: 78px;
      left: 0; right: 0;
      display: flex;
      gap: 24px;
      justify-content: center;
    }
    .bar-container { text-align: center; }
    .bar-label { font-size: 5px; color: #666; margin-bottom: 5px; display: block; letter-spacing: 1px; }
    .bar-track {
      width: 130px; height: 10px;
      background: #111;
      border: 1px solid #333;
      overflow: hidden;
    }
    .bar-fill { height: 100%; transition: width 0.12s ease; }
    .bar-fill.volume { background: linear-gradient(90deg, #ff4400, #ff6600); box-shadow: 0 0 6px #ff6600; }
    .bar-fill.star   { background: linear-gradient(90deg, #88cc00, #ccff00); box-shadow: 0 0 6px #ccff00; }

    /* ─── VICTORY OVERLAY ─── */
    #victoryOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15px;
      z-index: 60;
      pointer-events: none;
    }
    #victoryOverlay.active { display: flex; }
    #resetBtn {
      pointer-events: all;
      background: linear-gradient(135deg, #ff6600, #cc4400);
      color: #000;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 9px;
      padding: 14px 30px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,102,0,0.7);
      letter-spacing: 2px;
      transition: all 0.15s;
    }
    #resetBtn:hover {
      background: linear-gradient(135deg, #ccff00, #99cc00);
      box-shadow: 0 0 30px rgba(204,255,0,0.8);
    }

    /* ─── REPLAY BUTTON ─── */
    #replayBtn {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 3px solid #ccff00;
      color: #ccff00;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 2px;
      display: none;
      z-index: 45;
      box-shadow: 0 0 20px rgba(204,255,0,0.5);
      transition: all 0.15s;
    }
    #replayBtn.active { display: block; }
    #replayBtn:hover { background: #ccff00; color: #000; box-shadow: 0 0 35px rgba(204,255,0,0.9); }

    #touchControls {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      display: none;
      justify-content: center;
      gap: 20px;
      z-index: 40;
      pointer-events: none;
    }
    #touchControls.active { display: flex; }
    .touch-btn {
      pointer-events: all;
      width: 70px; height: 40px;
      border: 2px solid;
      background: rgba(0,0,0,0.6);
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .touch-btn.lane0 { border-color: #ff6600; color: #ff6600; }
    .touch-btn.lane1 { border-color: #ccff00; color: #ccff00; }
    .touch-btn.lane2 { border-color: #00ffcc; color: #00ffcc; }
    .touch-btn:active { opacity: 0.7; }

      </div>

        <div class="bar-track"><div class="bar-fill star" id="barStar" style="width:0%"></div></div>

    </div>

  <!-- Replay track button (visible during gameplay) -->
  <button id="replayBtn" onclick="replayTrack()">↩ REPLAY</button>

  <!-- Victory overlay with reset button -->
  <div id="victoryOverlay">
    <button id="resetBtn" onclick="resetGame()">↺ PLAY AGAIN</button>
  </div>

  <!-- Mobile touch controls -->
  <div id="touchControls">
    <button class="touch-btn lane0" ontouchstart="touchHit(0)" onmousedown="touchHit(0)">←</button>
    <button class="touch-btn lane1" ontouchstart="touchHit(1)" onmousedown="touchHit(1)">↓</button>
    <button class="touch-btn lane2" ontouchstart="touchHit(2)" onmousedown="touchHit(2)">→</button>
  </div>
</div>

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

//  AUDIO ENGINE — Electric Guitar (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx = null;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Hard-clip distortion curve (makes it sound like overdrive/distortion pedal)
function makeDistortionCurve(amount) {
  const n = 512, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

// Clean bell/pluck tone — sine fundamental + harmonic overtones, no distortion
// Pitch is crystal clear, melodies are immediately recognizable
function playGuitar(freq, sustain = 0.55, vol = 0.75) {
  try {
    const ac = getAC();
    const t = ac.currentTime;

    // Layered harmonics: fundamental + 2nd + 3rd (natural overtone series)
    // Volumes taper off so fundamental dominates → pitch is unambiguous
    const partials = [
      { mult: 1.0, type: 'sine',     gain: 1.00 },
      { mult: 2.0, type: 'sine',     gain: 0.28 },
      { mult: 3.0, type: 'triangle', gain: 0.10 },
    ];

    partials.forEach(({ mult, type, gain }) => {
      const osc = ac.createOscillator();
      const og  = ac.createGain();
      osc.type = type;
      osc.frequency.value = freq * mult;

      // Each partial decays at its own speed (higher = faster, like a real string)
      og.gain.setValueAtTime(0.001, t);
      og.gain.linearRampToValueAtTime(vol * gain, t + 0.006);
      og.gain.exponentialRampToValueAtTime(vol * gain * 0.6, t + 0.04);
      og.gain.exponentialRampToValueAtTime(0.0001, t + sustain * (1 / mult));

      osc.connect(og);
      og.connect(ac.destination);
      osc.start(t);
      osc.stop(t + sustain + 0.1);
    });

    // Soft attack click (fingerpick texture, very subtle)
    const nBuf = ac.createBuffer(1, ac.sampleRate * 0.010, ac.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let j = 0; j < nd.length; j++)
      nd[j] = (Math.random() * 2 - 1) * Math.exp(-j / (ac.sampleRate * 0.002));
    const nSrc = ac.createBufferSource();
    nSrc.buffer = nBuf;
    const nGain = ac.createGain();
    nGain.gain.value = 0.06;
    nSrc.connect(nGain);
    nGain.connect(ac.destination);
    nSrc.start(t);

  } catch(e) {}
}

// Lane-specific guitar notes (like Guitar Hero fret colors)
// Green(low E) / Red(A) / Yellow(D) / Blue(G) / Orange(B)
// We have 3 lanes → E2=82Hz, A2=110Hz, D3=147Hz (power chords!)
const LANE_FREQS = [110, 147, 196]; // A2, D3, G3

function playHit(freq, perfect, sustain) {
  if (game.levelIndex === 2) {
    // Level 3 (Jump) — Oberheim OB-Xa analog synth
    const s = (sustain !== undefined) ? sustain : (perfect ? 0.50 : 0.35);
    playOBXa(freq, s, perfect ? 0.75 : 0.65);
    return;
  }
  const s = (sustain !== undefined) ? sustain : (perfect ? 0.55 : 0.38);
  playGuitar(freq, s, perfect ? 0.82 : 0.70);
  if (perfect) {
    // Extra shimmer on perfect
    try {
      const ac = getAC();
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * 4;
      g.gain.setValueAtTime(0.12, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      osc.connect(g); g.connect(ac.destination);
      osc.start(); osc.stop(ac.currentTime + 0.28);
    } catch(e) {}
  }
}

function playMiss() {
  try {
    const ac = getAC();
    const t = ac.currentTime;
    // Muted thud — dead string
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.09);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 400;
    osc.connect(lp); lp.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.12);
  } catch(e) {}
}

function playLevelComplete() {
  // Power chord riff ascending
  [[110,0],[147,0.1],[196,0.2],[294,0.32],[392,0.44]].forEach(([f,d]) =>

}

function playVictory() {

}

// ── Oberheim OB-Xa — punchy staccato chords (Jump style) ──
// 4 detuned sawtooth oscillators → fat ensemble texture
// Fixed open LP filter → bright, not muddy
// Fast 30ms attack, short sustain, quick 160ms release
function playOBXa(freq, sustain = 0.45, vol = 0.70) {
  try {
    const ac = getAC();
    const t = ac.currentTime;

    const masterGain = ac.createGain();
    masterGain.gain.value = vol;
    masterGain.connect(ac.destination);

    // Fixed LP filter — open and bright (as in the real Jump recording)
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2400;
    filter.Q.value = 0.7;
    filter.connect(masterGain);

    // 4 detuned saws: 2 wide ±7 cents + 2 narrow ±2 cents
    [
      { det: -7, og: 0.28 },
      { det: +7, og: 0.28 },
      { det: -2, og: 0.22 },
      { det: +2, og: 0.22 },
    ].forEach(({ det, og }) => {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc.detune.value = det;

      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(og, t + 0.030);      // 30ms attack
      g.gain.setValueAtTime(og, t + sustain);             // hold flat
      g.gain.exponentialRampToValueAtTime(0.001, t + sustain + 0.16); // 160ms release

      osc.connect(g);
      g.connect(filter);
      osc.start(t);
      osc.stop(t + sustain + 0.22);
    });

    // Sub octave (sine) — body under the chord
    const sub = ac.createOscillator();
    const subG = ac.createGain();
    sub.type = 'sine';
    sub.frequency.value = freq / 2;
    subG.gain.setValueAtTime(0.001, t);
    subG.gain.linearRampToValueAtTime(0.10, t + 0.030);
    subG.gain.setValueAtTime(0.10, t + sustain);
    subG.gain.exponentialRampToValueAtTime(0.001, t + sustain + 0.16);
    sub.connect(subG);
    subG.connect(filter);
    sub.start(t);
    sub.stop(t + sustain + 0.22);

  } catch(e) {}
}

let beatInterval = null;
function startBeat() {
  stopBeat();
  let tick = 0;
  beatInterval = setInterval(() => {
    if (game.screen !== 'PLAYING') { stopBeat(); return; }
    const ac = getAC();

    // KICK — beats 0 and 2
    if (tick % 4 === 0 || tick % 4 === 2) {
      try {
        const buf = ac.createBuffer(1, ac.sampleRate * 0.18, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++)
          d[i] = Math.sin(2 * Math.PI * 55 * i / ac.sampleRate * Math.exp(-i/(ac.sampleRate*0.025))) *
                 Math.exp(-i / (ac.sampleRate * 0.06));
        const src = ac.createBufferSource(); src.buffer = buf;
        const g = ac.createGain(); g.gain.value = 0.8;
        src.connect(g); g.connect(ac.destination); src.start();
      } catch(e) {}
    }

    // SNARE — beats 1 and 3
    if (tick % 4 === 1 || tick % 4 === 3) {
      try {
        const buf = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++)
          d[i] = ((Math.random()*2-1) * 0.7 + Math.sin(2*Math.PI*220*i/ac.sampleRate) * 0.3) *
                 Math.exp(-i / (ac.sampleRate * 0.035));
        const src = ac.createBufferSource(); src.buffer = buf;
        const g = ac.createGain(); g.gain.value = 0.55;
        const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=200;
        src.connect(hpf); hpf.connect(g); g.connect(ac.destination); src.start();
      } catch(e) {}
    }

    // HI-HAT — every 8th note
    try {
      const buf = ac.createBuffer(1, ac.sampleRate * 0.04, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0; i<d.length; i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.012));
      const src = ac.createBufferSource(); src.buffer = buf;
      const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=8000;
      const g = ac.createGain(); g.gain.value = tick%4===0||tick%4===2 ? 0.1 : 0.18;
      src.connect(hpf); hpf.connect(g); g.connect(ac.destination); src.start();
    } catch(e) {}

    tick++;
  }, 250); // 120 BPM, 8th notes
}

function stopBeat() {
  if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
}

function initParticles() {

    game.bgParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      sz: Math.random() * 1.8 + 0.3,
      spd: Math.random() * 0.5 + 0.1,

// ═══════════════════════════════════════════════
//  DRAW UTILITIES
// ═══════════════════════════════════════════════
function drawBackground() {
  ctx.fillStyle = '#05050d';
  ctx.fillRect(0, 0, W, H);

  // Drifting particles
  game.bgParticles.forEach(p => {
    p.y -= p.spd;
    if (p.y < 0) { p.y = H + 2; p.x = Math.random() * W; }
    ctx.globalAlpha = p.a;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x, p.y, p.sz, p.sz);
  });
  ctx.globalAlpha = 1;

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ─── Zally Metal character (PNG sprite) ───────────
const zallyImg = new Image();

function drawZally(cx, cy, scale, t) {
  const bob = Math.sin(t * 0.0025) * 5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 100 * scale, 30 * scale, 9 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  if (!zallyImgLoaded) return;

  const baseH = 220;
  const aspect = zallyImg.naturalWidth / zallyImg.naturalHeight;
  const h = baseH * scale, w = h * aspect;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 14;
  ctx.shadowColor = 'rgba(255,102,0,0.5)';
  ctx.drawImage(zallyImg, cx - w / 2, cy - h * 0.62 + bob, w, h);
  ctx.restore();
}


// ─── Lanes ───────────────────────────────────────
function drawLanes() {
  LANES.forEach(lane => {
    const x = lane.x;
    // Lane walls (faint)
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = lane.color;
    ctx.fillRect(x - LANE_W / 2, 0, LANE_W, H);
    ctx.globalAlpha = 1;

    // Edge lines
    [x - LANE_W / 2, x + LANE_W / 2].forEach(ex => {
      ctx.strokeStyle = lane.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.moveTo(ex, 0);
      ctx.lineTo(ex, H);
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    // Center dash line
    ctx.strokeStyle = lane.color;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.08;
    ctx.setLineDash([12, 18]);
    ctx.beginPath();
    ctx.moveTo(x, 80);
    ctx.lineTo(x, TRIGGER_Y - 30);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  });
}

// ─── Trigger zone ────────────────────────────────
function drawTrigger(keys) {
  LANES.forEach((lane, i) => {
    const x = lane.x;
    const active = keys[lane.key];

    if (active) {
      const grd = ctx.createRadialGradient(x, TRIGGER_Y, 0, x, TRIGGER_Y, LANE_W / 2 + 8);
      grd.addColorStop(0, lane.color + 'aa');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x, TRIGGER_Y, LANE_W / 2 + 8, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = lane.color;
    ctx.lineWidth = active ? 4 : 2;
    ctx.globalAlpha = active ? 1 : 0.45;
    ctx.shadowBlur = active ? 14 : 0;
    ctx.shadowColor = lane.color;
    ctx.beginPath();
    ctx.arc(x, TRIGGER_Y, NOTE_R + 8, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = active ? lane.color : '#0d0d1f';
    ctx.globalAlpha = active ? 0.9 : 0.4;
    ctx.beginPath();
    ctx.arc(x, TRIGGER_Y, NOTE_R + 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = lane.color;
    ctx.font = 'bold 13px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lane.label, x, TRIGGER_Y + 5);
    ctx.globalAlpha = 1;
  });
}

// ─── Notes ───────────────────────────────────────
function drawNotes() {
  game.notes.forEach(n => {
    if (!n.spawned || n.missed) return;
    const lane = LANES[n.lane];

    if (n.hit) {
      // Explosion ring
      const a = 1 - n.hitAnim / 22;
      const sc = 1 + n.hitAnim / 8;
      ctx.globalAlpha = a;
      ctx.strokeStyle = lane.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = lane.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, NOTE_R * sc, 0, Math.PI * 2);
      ctx.stroke();
      // Sparks
      for (let s = 0; s < 8; s++) {
        const ang = (s / 8) * Math.PI * 2;
        const d = NOTE_R * sc * 1.4;
        ctx.fillStyle = lane.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(n.x + Math.cos(ang) * d, n.y + Math.sin(ang) * d, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      n.hitAnim++;
      if (n.hitAnim > 22) n.spawned = false;
      return;
    }

    // Outer halo
    const hrd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, NOTE_R + 14);
    hrd.addColorStop(0, lane.color + '55');
    hrd.addColorStop(1, 'transparent');
    ctx.fillStyle = hrd;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R + 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Note body
    ctx.fillStyle = lane.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = lane.color;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Gloss
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.beginPath();
    ctx.arc(n.x - NOTE_R * 0.28, n.y - NOTE_R * 0.3, NOTE_R * 0.38, 0, Math.PI * 2);
    ctx.fill();

    // Rim
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R, 0, Math.PI * 2);
    ctx.stroke();
  });
}

// ─── Combo / flash FX ────────────────────────────
function drawFX() {
  if (game.flashFx) {
    ctx.fillStyle = game.flashFx.col;
    ctx.globalAlpha = game.flashFx.a;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    game.flashFx.a -= 0.06;
    if (game.flashFx.a <= 0) game.flashFx = null;
  }
  if (game.comboText) {
    const ct = game.comboText;
    ctx.globalAlpha = Math.max(0, 1 - ct.f / 28);
    ctx.fillStyle = ct.col;
    ctx.font = `${9 + ct.f * 0.25}px "Press Start 2P", monospace`;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10;
    ctx.shadowColor = ct.col;
    ctx.fillText(ct.txt, ct.x, ct.y - ct.f * 1.8);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ct.f++;
    if (ct.f > 28) game.comboText = null;
  }
}

// ═══════════════════════════════════════════════
//  SCREEN RENDERERS
// ═══════════════════════════════════════════════

  ctx.font = '6.5px "Press Start 2P", monospace';

function renderLevelComplete(t) {

  drawZally(W / 2, H / 2 + 150, 1.0, t);

  ctx.fillStyle = '#ccff00';
  ctx.font = '22px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 22;
  ctx.shadowColor = '#ccff00';
  ctx.fillText('LEVEL COMPLETE!', W / 2, H / 2 - 30);

  ctx.font = '9px "Press Start 2P", monospace';

}

function renderTransmitting(t) {
  drawBackground();
  drawZally(W / 2, 480, 1.0, t);

  const elapsed = t - game.transmitStart;
  const prog = Math.min(1, elapsed / 2500);

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.roundRect(180, 160, 440, 190, 6);
  ctx.fill();
  ctx.strokeStyle = '#ff6600';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ff6600';
  ctx.beginPath();
  ctx.roundRect(180, 160, 440, 190, 6);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff6600';
  ctx.font = '8.5px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('📡 TRANSMITTING', W / 2, 208);
  ctx.fillText('SOUND MASTERING REPORT...', W / 2, 238);

  // Progress bar
  ctx.fillStyle = '#111';
  ctx.fillRect(210, 266, 380, 18);
  ctx.fillStyle = prog > 0.5 ? '#ccff00' : '#ff6600';
  ctx.shadowBlur = Math.floor(t / 80) % 2 === 0 ? 8 : 0;
  ctx.shadowColor = ctx.fillStyle;
  ctx.fillRect(210, 266, 380 * prog, 18);
  ctx.shadowBlur = 0;

  const dots = '.'.repeat(Math.floor(elapsed / 350) % 4);
  ctx.fillStyle = '#888';
  ctx.font = '6.5px "Press Start 2P", monospace';
  ctx.fillText(Math.floor(prog * 100) + '%  PROCESSING' + dots, W / 2, 316);

  if (prog >= 1) {
    setTimeout(() => {
      if (game.screen === 'TRANSMITTING') {
        game.screen = 'VICTORY';
        victoryOverlay.classList.add('active');
        playVictory();
      }
    }, 100);
  }
}

function renderVictory(t) {
  drawBackground();

  // Background glow
  const grd = ctx.createRadialGradient(W / 2, H / 2 - 40, 0, W / 2, H / 2 - 40, 340);
  grd.addColorStop(0, 'rgba(204,255,0,0.12)');
  grd.addColorStop(0.5, 'rgba(255,102,0,0.06)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Spinning stars
  for (let i = 0; i < 10; i++) {
    const ang = (i / 10) * Math.PI * 2 + t * 0.00065;
    const r = 210 + Math.sin(t * 0.002 + i) * 18;
    const sx = W / 2 + Math.cos(ang) * r;
    const sy = H / 2 - 50 + Math.sin(ang) * r * 0.45;
    ctx.fillStyle = i % 2 === 0 ? '#ff6600' : '#ccff00';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(sx, sy, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Trophy
  ctx.font = '52px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏆', W / 2, 120);

  // Title
  ctx.fillStyle = '#ccff00';
  ctx.font = '17px "Press Start 2P", monospace';
  ctx.shadowBlur = 22;
  ctx.shadowColor = '#ccff00';
  ctx.fillText('YF&K AI ROCKSTAR', W / 2, 172);
  ctx.fillText('MASTER!', W / 2, 204);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff6600';
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillText('FINAL SCORE: ' + game.totalScore, W / 2, 246);

  ctx.fillStyle = '#fff';
  ctx.font = '6.5px "Press Start 2P", monospace';
  ctx.fillText('ALL 4 LYRIA 3.5 PROMPTS UNLOCKED!', W / 2, 278);

  ctx.fillStyle = '#666';
  ctx.font = '5.5px "Press Start 2P", monospace';
  ctx.fillText('CHALLENGE COMPLETED: "CREATE AN ANTHEM FOR THE TEAM"', W / 2, 305);

  // Zally Jump — bouncing celebration
  if (zallyJumpLoaded) {
    const aspect = zallyJumpImg.naturalWidth / zallyJumpImg.naturalHeight;
    const h = 260, w = h * aspect;
    // Bounce: fast up-down jump loop
    const bounce = Math.abs(Math.sin(t * 0.004)) * 38;
    // Subtle left-right sway
    const sway = Math.sin(t * 0.0022) * 10;
    // Glow pulse
    ctx.shadowBlur = 20 + Math.sin(t * 0.005) * 12;
    ctx.shadowColor = 'rgba(204,255,0,0.7)';
    ctx.drawImage(zallyJumpImg, W / 2 - w / 2 + sway, 320 - bounce, w, h);
    ctx.shadowBlur = 0;
  }
}

function renderGameplay(ts) {
  drawBackground();
  drawLanes();
  drawTrigger(game.keys);

  // Update + draw notes
  const el = game.gameElapsed;
  game.notes.forEach(n => {
    if (n.hit || n.missed) return;
    const spawnMs = n.hitTime - TRAVEL_MS;
    if (el >= spawnMs) {
      n.spawned = true;
      const prog = (el - spawnMs) / TRAVEL_MS;
      n.x = LANES[n.lane].x;
      n.y = -NOTE_R * 2 + prog * (TRIGGER_Y + NOTE_R * 2 + 30);
      // Check auto-miss
      if (!n.missed && el > n.hitTime + HIT_WINDOW + 100) {
        n.missed = true;
        playMiss();
        game.volumeMix = Math.max(0, game.volumeMix - 0.5);
        game.starPower = Math.max(0, game.starPower - 4);
        game.flashFx = { col: 'rgba(255,0,50,0.25)', a: 0.25 };
        updateHUD();
        if (game.volumeMix <= 0 && !game.levelDone) {
          game.levelDone = true;
          setTimeout(restartLevel, 600);
        }
      }
    }
  });
  drawNotes();
  drawFX();

  // Zally on side
  drawZally(88, 490, 0.72, ts);

  // Timer bar
  const timeLeft = Math.max(0, GAME_DUR - el);
  const tfrac = timeLeft / GAME_DUR;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, 7);
  ctx.fillStyle = tfrac > 0.4 ? '#ccff00' : tfrac > 0.2 ? '#ff6600' : '#ff0033';
  ctx.shadowBlur = tfrac < 0.2 ? 8 : 0;
  ctx.shadowColor = '#ff0033';
  ctx.fillRect(0, 0, W * tfrac, 7);
  ctx.shadowBlur = 0;

  // End level: 2s after last note OR when GAME_DUR elapsed
  const lastNoteTime = game.notes.length ? Math.max(...game.notes.map(n => n.hitTime)) : 0;
  if (!game.levelDone && (el >= lastNoteTime + 800 || el >= GAME_DUR)) {
    game.levelDone = true;
    setTimeout(levelComplete, 600);
  }
}

// ═══════════════════════════════════════════════
//  GAMEPLAY LOGIC
// ═══════════════════════════════════════════════
function prepareNotes(lvData) {
  game.notes = lvData.notePattern.map(n => ({
    lane: n.l,
    hitTime: n.t,
    freq: n.f || LANE_FREQS[n.l],
    x: LANES[n.l].x,
    y: -NOTE_R * 2,
    spawned: false,
    hit: false,
    missed: false,
    hitAnim: 0,
  }));
}

function handleHit(laneIdx) {
  if (game.screen !== 'PLAYING') return;
  const el = game.gameElapsed;
  let best = null, bestDiff = Infinity;
  game.notes.forEach(n => {
    if (!n.spawned || n.hit || n.missed || n.lane !== laneIdx) return;
    const diff = Math.abs(el - n.hitTime);
    if (diff <= HIT_WINDOW && diff < bestDiff) { bestDiff = diff; best = n; }
  });
  if (!best) return;

  best.hit = true;
  best.hitAnim = 0;

  const perfect = bestDiff < 50;
  // Level 4 (Eye of Tiger), lane 2 punch note → extra-long sustain
  const punchSustain = (game.levelIndex === 3 && laneIdx === 2)
    ? (perfect ? 1.2 : 0.9) : undefined;
  playHit(best.freq, perfect, punchSustain);
  const pts = perfect ? 150 : 100;
  game.score += pts;
  game.totalScore += pts;
  game.starPower = Math.min(game.maxStar, game.starPower + 12);
  game.volumeMix = Math.min(game.maxVol, game.volumeMix + 0.25);

  const lane = LANES[laneIdx];
  game.comboText = { txt: perfect ? 'PERFECT!' : 'GOOD!', x: lane.x, y: TRIGGER_Y - 44, col: perfect ? '#ccff00' : '#ff6600', f: 0 };
  game.flashFx = { col: lane.color + '18', a: 0.12 };
  updateHUD();
}

function updateHUD() {
  hudScore.textContent = 'SCORE: ' + game.score;
  hudLevel.textContent = 'LEVEL ' + (game.levelIndex + 1);
  barVolume.style.width = (game.volumeMix / game.maxVol * 100) + '%';
  barStar.style.width = (game.starPower / game.maxStar * 100) + '%';
}

// ═══════════════════════════════════════════════
//  MODAL SYSTEM
// ═══════════════════════════════════════════════
function showQuestion(lvIdx) {
  const lv = LEVELS_DATA[lvIdx];
  game.screen = 'QUESTION';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');

  const opts = lv.options.map((o, i) =>
    `<button class="option-btn" onclick="handleAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
  ).join('');

  modalContent.innerHTML = `
    <div class="modal-badge">${lv.badge}</div>
    <div class="modal-title">LEVEL ${lv.number}: ${lv.title} — ${lv.subtitle}</div>
    <div class="modal-question">❓ ${lv.question}</div>
    ${opts}
    <div style="font-size:5.5px;color:#444;margin-top:12px;text-align:center;line-height:2;">
      ⚡ Rispondi correttamente per accordare lo strumento e sbloccare il Prompt Perfetto
    </div>
  `;
  overlay.classList.add('active');
}

function handleAnswer(idx) {
  const lv = LEVELS_DATA[game.levelIndex];
  const btns = modalContent.querySelectorAll('.option-btn');
  btns.forEach(b => { b.disabled = true; });

  if (idx === lv.correctIndex) {
    btns[idx].classList.add('correct');
    setTimeout(() => showUnlocked(lv), 300);
  } else {
    btns[idx].classList.add('wrong');
    btns[lv.correctIndex].classList.add('correct');

    const hintEl = document.createElement('div');
    hintEl.className = 'hint-box';
    hintEl.style.whiteSpace = 'pre-line';
    hintEl.textContent = lv.hint;
    modalContent.appendChild(hintEl);

    const retry = document.createElement('button');
    retry.className = 'play-btn';
    retry.style.cssText = 'background:linear-gradient(135deg,#330000,#1a0000);color:#ff4444;margin-top:14px;';
    retry.textContent = '↩ RIPROVA';
    retry.onclick = () => showQuestion(game.levelIndex);
    modalContent.appendChild(retry);
  }
}

function showUnlocked(lv) {
  const promptLines = lv.unlockedPrompt.replace(/\\n/g, '\n');
  modalContent.innerHTML = `
    <div class="modal-badge">✅ RISPOSTA CORRETTA!</div>
    <div class="modal-title" style="color:#ccff00;">STRUMENTO ACCORDATO! 🎸</div>
    <div class="hint-box" style="white-space:pre-line;">${lv.hint}</div>
    <div class="unlock-box">
      <span class="unlock-label">🔓 ${lv.promptLabel}</span>
      <span class="prompt-text" style="white-space:pre-line;">${promptLines}</span>
    </div>
    <div style="font-size:5.5px;color:#666;margin-top:12px;line-height:2;text-align:center;">
      Questo prompt segue le Best Practice ufficiali di Lyria 3.5 — Human in the Loop attivo!
    </div>
    <button class="play-btn" onclick="startGameplay()">🎵 SUONA LA TRACCIA</button>
  `;
}

// ═══════════════════════════════════════════════
//  TRANSITIONS
// ═══════════════════════════════════════════════
function startGameplay() {
  overlay.classList.remove('active');
  hudEl.classList.add('active');
  touchControls.classList.add('active');
  replayBtn.classList.remove('active');
  game.screen = 'PLAYING';
  game.score = 0;
  game.volumeMix = 10;
  game.starPower = 0;
  game.levelDone = false;
  game.flashFx = null;
  game.comboText = null;
  game.gameStart = performance.now();
  prepareNotes(LEVELS_DATA[game.levelIndex]);
  updateHUD();
  startBeat();
}

function replayTrack() {
  stopBeat();
  game.score = 0;
  game.volumeMix = 10;
  game.starPower = 0;
  game.levelDone = false;
  game.flashFx = null;
  game.comboText = null;
  game.screen = 'PLAYING';
  game.gameStart = performance.now();
  prepareNotes(LEVELS_DATA[game.levelIndex]);
  hudEl.classList.add('active');
  touchControls.classList.add('active');
  replayBtn.classList.remove('active');
  updateHUD();
  startBeat();
}

function restartLevel() {
  stopBeat();
  game.flashFx = null;
  game.comboText = null;
  game.screen = 'QUESTION';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');
  replayBtn.classList.remove('active');
  showQuestion(game.levelIndex);
}

function levelComplete() {
  stopBeat();
  playLevelComplete();
  game.screen = 'LEVEL_COMPLETE';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');
  replayBtn.classList.add('active');

  if (game.levelIndex < LEVELS_DATA.length - 1) {
    const doneIdx = game.levelIndex; // keep current index so replayTrack() works
    setTimeout(() => {
      game.levelIndex = doneIdx + 1;
      replayBtn.classList.remove('active');
      showQuestion(game.levelIndex);
    }, 2200);
  } else {
    setTimeout(() => {
      replayBtn.classList.remove('active');
      game.screen = 'TRANSMITTING';
      game.transmitStart = performance.now();
    }, 2200);
  }
}

function resetGame() {
  stopBeat();
  game.screen = 'MENU';
  game.levelIndex = 0;
  game.score = 0;
  game.totalScore = 0;
  game.starPower = 0;
  game.volumeMix = 10;
  game.notes = [];
  game.levelDone = false;
  game.flashFx = null;
  game.comboText = null;
  overlay.classList.remove('active');
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');
  replayBtn.classList.remove('active');
  victoryOverlay.classList.remove('active');
  updateHUD();
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  ctx.clearRect(0, 0, W, H);

  if (game.screen === 'PLAYING') {
    game.gameElapsed = ts - game.gameStart;
  }

  switch (game.screen) {
    case 'MENU':
      renderMenu(ts);
      break;
    case 'QUESTION':
    case 'ANSWER':
      drawBackground();
      drawZally(700, 460, 0.72, ts);
      break;
    case 'PLAYING':
      renderGameplay(ts);
      break;
    case 'LEVEL_COMPLETE':
      renderLevelComplete(ts);
      break;
    case 'TRANSMITTING':
      renderTransmitting(ts);
      break;
    case 'VICTORY':
      renderVictory(ts);
      break;
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (game.keys[e.key]) return;
  game.keys[e.key] = true;

  if (game.screen === 'MENU' && (e.key === 'Enter' || e.key === ' ')) {
    showQuestion(0);
    return;
  }
  if (game.screen === 'PLAYING') {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); handleHit(0); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); handleHit(1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); handleHit(2); }
  }
});

document.addEventListener('keyup', e => { game.keys[e.key] = false; });

// Canvas click (menu start)
canvas.addEventListener('click', () => {
  if (game.screen === 'MENU') showQuestion(0);
});

// Touch hit
function touchHit(laneIdx) {
  handleHit(laneIdx);
  // fake key flash
  const keyMap = ['ArrowLeft', 'ArrowDown', 'ArrowRight'];
  game.keys[keyMap[laneIdx]] = true;
  setTimeout(() => { game.keys[keyMap[laneIdx]] = false; }, 120);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
initParticles();
updateHUD();
requestAnimationFrame(loop);
</script>
