if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

//  AUDIO ENGINE (Web Audio API — no external files)

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, duration, vol, delay = 0) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    gain.gain.setValueAtTime(0, ac.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ac.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + duration + 0.05);
  } catch(e) {}
}

function playHit(perfect) {
  if (perfect) {
    playTone(880, 'sine', 0.18, 0.35);
    playTone(1320, 'sine', 0.18, 0.2, 0.04);
  } else {
    playTone(660, 'sine', 0.15, 0.3);
  }
}

function playMiss() {
  playTone(180, 'sawtooth', 0.18, 0.25);
  playTone(120, 'sawtooth', 0.15, 0.2, 0.06);
}

function playLevelComplete() {
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.35, 0.3, i * 0.1));
}

function playVictory() {
  [523,659,784,1047,1319,1047,784,1319,1047].forEach((f,i) =>
    playTone(f, 'sine', 0.3, 0.3, i * 0.12));
}

// Background beat (kick + hihat loop during gameplay)
let beatInterval = null;
function startBeat() {
  stopBeat();
  let tick = 0;
  beatInterval = setInterval(() => {
    if (game.screen !== 'PLAYING') { stopBeat(); return; }
    const ac = getAudioCtx();
    // Kick on beats 1 & 3
    if (tick % 4 === 0 || tick % 4 === 2) {
      try {
        const buf = ac.createBuffer(1, ac.sampleRate * 0.15, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.04));
        }
        const src = ac.createBufferSource();
        src.buffer = buf;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.45, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
        src.connect(g); g.connect(ac.destination);
        src.start();
      } catch(e) {}
    }
    // Hi-hat on every tick
    try {
      const ac2 = getAudioCtx();
      const buf2 = ac2.createBuffer(1, ac2.sampleRate * 0.05, ac2.sampleRate);
      const d2 = buf2.getChannelData(0);
      for (let i = 0; i < d2.length; i++) {
        d2[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac2.sampleRate * 0.015));
      }
      const src2 = ac2.createBufferSource();
      src2.buffer = buf2;
      const hpf = ac2.createBiquadFilter();
      hpf.type = 'highpass'; hpf.frequency.value = 7000;
      const g2 = ac2.createGain();
      g2.gain.value = tick % 4 === 1 || tick % 4 === 3 ? 0.18 : 0.08;
      src2.connect(hpf); hpf.connect(g2); g2.connect(ac2.destination);
      src2.start();
    } catch(e) {}
    tick++;
  }, 250); // 120 BPM = 500ms/beat, hihat every 8th = 250ms
}

function stopBeat() {
  if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
}

function drawBackground() {
  ctx.fillStyle = '#05050d';
  ctx.fillRect(0, 0, W, H);

  // Drifting particles
  game.bgParticles.forEach(p => {
    p.y -= p.spd;
    if (p.y < 0) { p.y = H + 2; p.x = Math.random() * W; }
    ctx.globalAlpha = p.a;
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x, p.y, p.sz, p.sz);
  });
  ctx.globalAlpha = 1;

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ─── Zally Metal character ───────────────────────
function drawZally(cx, cy, scale, t) {
  ctx.save();

  const bob = Math.sin(t * 0.0025) * 5;
  const arm = Math.sin(t * 0.003);
  ctx.translate(0, bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 100, 28, 8, 0, 0, Math.PI * 2);

  // Legs
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(-19, 65, 14, 38);
  ctx.fillRect(6, 65, 14, 38);
  // Boots
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-22, 98, 18, 8);
  ctx.fillRect(5, 98, 18, 8);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(-22, 103, 18, 3);
  ctx.fillRect(5, 103, 18, 3);

  // Body (leather jacket)
  ctx.fillStyle = '#111128';
  ctx.beginPath();
  ctx.roundRect(-22, 12, 44, 56, 5);
  ctx.fill();

  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-10, 12);
  ctx.lineTo(-10, 68);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10, 12);
  ctx.lineTo(10, 68);
  ctx.stroke();
  // Lightning bolt on jacket
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(-4, 18);
  ctx.lineTo(3, 36);
  ctx.lineTo(-1, 36);
  ctx.lineTo(6, 58);
  ctx.lineTo(0, 44);
  ctx.lineTo(4, 44);
  ctx.lineTo(-4, 18);
  ctx.fill();

  // Left arm UP (lightbulb hand)
  ctx.save();
  ctx.translate(-23, 22);

  // Lightbulb
  const lbx = -46, lby = -20 + bob * 0.2;

  ctx.stroke();
  // Base

  ctx.fillRect(lbx - 5, lby + 3, 10, 7);
  ctx.fillStyle = '#777';
  ctx.fillRect(lbx - 4, lby + 5, 8, 2);
  // Filament glow lines
  ctx.strokeStyle = 'rgba(255,140,0,0.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lbx - 3, lby - 2);
  ctx.lineTo(lbx, lby - 8);
  ctx.lineTo(lbx + 3, lby - 2);
  ctx.stroke();
  // Shine spot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(lbx - 3, lby - 10, 3, 0, Math.PI * 2);
  ctx.fill();

  // Right arm (rock fist)
  ctx.save();
  ctx.translate(23, 22);
  ctx.rotate(0.45 + arm * 0.1);
  ctx.fillStyle = '#e8b896';
  ctx.fillRect(-6, 0, 12, 28);
  // Fist knuckles
  ctx.fillStyle = '#d9a882';
  ctx.beginPath();
  ctx.roundRect(-7, 27, 14, 11, 3);
  ctx.fill();
  ctx.restore();

  // Neck
  ctx.fillStyle = '#e8b896';
  ctx.fillRect(-6, -2, 12, 16);

  // Head
  ctx.fillStyle = '#e8b896';
  ctx.beginPath();
  ctx.ellipse(0, -16, 17, 19, 0, 0, Math.PI * 2);
  ctx.fill();
  // Stubble
  ctx.fillStyle = 'rgba(80,40,20,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, -5, 10, 6, 0, 0, Math.PI);
  ctx.fill();

  // Mohawk / Crest
  const crests = [
    {dx: -10, h: 24, col: '#ff0044'},
    {dx: -5,  h: 32, col: '#ff6600'},
    {dx:  0,  h: 36, col: '#ccff00'},
    {dx:  5,  h: 30, col: '#ff6600'},
    {dx: 10,  h: 22, col: '#ff0044'},

  crests.forEach(c => {

    ctx.lineTo(c.dx, -30 - c.h);
    ctx.lineTo(c.dx + 4, -30);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(c.dx, -30 - c.h + 2, 2, 0, Math.PI * 2);
    ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath();
  ctx.ellipse(-7, -18, 4, 4, -0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7, -18, 4, 4, 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Pupils (intense)
  ctx.fillStyle = '#ff4400';
  ctx.beginPath();
  ctx.arc(-7, -18, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -18, 2, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-6, -19, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -19, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Eyebrows (angry/rock)
  ctx.strokeStyle = '#3a1500';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-12, -24);
  ctx.lineTo(-4, -21);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, -24);
  ctx.lineTo(4, -21);
  ctx.stroke();

  // Smirk / mouth
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(-5, -8);
  ctx.quadraticCurveTo(2, -4, 8, -7);
  ctx.stroke();
  // Teeth
  ctx.fillStyle = '#fffde0';
  ctx.fillRect(-2, -8, 6, 3);

  ctx.restore();
}

// ─── Lanes ───────────────────────────────────────
function drawLanes() {
  LANES.forEach(lane => {
    const x = lane.x;
    // Lane walls (faint)
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = lane.color;
    ctx.fillRect(x - LANE_W / 2, 0, LANE_W, H);
    ctx.globalAlpha = 1;

    // Edge lines
    [x - LANE_W / 2, x + LANE_W / 2].forEach(ex => {
      ctx.strokeStyle = lane.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.moveTo(ex, 0);
      ctx.lineTo(ex, H);
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    // Center dash line
    ctx.strokeStyle = lane.color;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.08;
    ctx.setLineDash([12, 18]);
    ctx.beginPath();
    ctx.moveTo(x, 80);
    ctx.lineTo(x, TRIGGER_Y - 30);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  });
}

// ─── Trigger zone ────────────────────────────────
function drawTrigger(keys) {
  LANES.forEach((lane, i) => {
    const x = lane.x;
    const active = keys[lane.key];

    if (active) {
      const grd = ctx.createRadialGradient(x, TRIGGER_Y, 0, x, TRIGGER_Y, LANE_W / 2 + 8);
      grd.addColorStop(0, lane.color + 'aa');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x, TRIGGER_Y, LANE_W / 2 + 8, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = lane.color;
    ctx.lineWidth = active ? 4 : 2;
    ctx.globalAlpha = active ? 1 : 0.45;
    ctx.shadowBlur = active ? 14 : 0;
    ctx.shadowColor = lane.color;
    ctx.beginPath();
    ctx.arc(x, TRIGGER_Y, NOTE_R + 8, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = active ? lane.color : '#0d0d1f';
    ctx.globalAlpha = active ? 0.9 : 0.4;
    ctx.beginPath();
    ctx.arc(x, TRIGGER_Y, NOTE_R + 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = lane.color;
    ctx.font = 'bold 13px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lane.label, x, TRIGGER_Y + 5);
    ctx.globalAlpha = 1;
  });
}

// ─── Notes ───────────────────────────────────────
function drawNotes() {
  game.notes.forEach(n => {
    if (!n.spawned || n.missed) return;
    const lane = LANES[n.lane];

    if (n.hit) {
      // Explosion ring
      const a = 1 - n.hitAnim / 22;
      const sc = 1 + n.hitAnim / 8;
      ctx.globalAlpha = a;
      ctx.strokeStyle = lane.color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = lane.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, NOTE_R * sc, 0, Math.PI * 2);
      ctx.stroke();
      // Sparks
      for (let s = 0; s < 8; s++) {
        const ang = (s / 8) * Math.PI * 2;
        const d = NOTE_R * sc * 1.4;
        ctx.fillStyle = lane.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(n.x + Math.cos(ang) * d, n.y + Math.sin(ang) * d, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      n.hitAnim++;
      if (n.hitAnim > 22) n.spawned = false;
      return;
    }

    // Outer halo
    const hrd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, NOTE_R + 14);
    hrd.addColorStop(0, lane.color + '55');
    hrd.addColorStop(1, 'transparent');
    ctx.fillStyle = hrd;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R + 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Note body
    ctx.fillStyle = lane.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = lane.color;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Gloss
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.beginPath();
    ctx.arc(n.x - NOTE_R * 0.28, n.y - NOTE_R * 0.3, NOTE_R * 0.38, 0, Math.PI * 2);
    ctx.fill();

    // Rim
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(n.x, n.y, NOTE_R, 0, Math.PI * 2);
    ctx.stroke();
  });
}

// ─── Combo / flash FX ────────────────────────────
function drawFX() {
  if (game.flashFx) {
    ctx.fillStyle = game.flashFx.col;
    ctx.globalAlpha = game.flashFx.a;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    game.flashFx.a -= 0.06;
    if (game.flashFx.a <= 0) game.flashFx = null;
  }
  if (game.comboText) {
    const ct = game.comboText;
    ctx.globalAlpha = Math.max(0, 1 - ct.f / 28);
    ctx.fillStyle = ct.col;
    ctx.font = `${9 + ct.f * 0.25}px "Press Start 2P", monospace`;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 10;
    ctx.shadowColor = ct.col;
    ctx.fillText(ct.txt, ct.x, ct.y - ct.f * 1.8);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ct.f++;
    if (ct.f > 28) game.comboText = null;
  }
}

function renderTransmitting(t) {
  drawBackground();
  drawZally(W / 2, 480, 1.0, t);

  const elapsed = t - game.transmitStart;
  const prog = Math.min(1, elapsed / 2500);

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.roundRect(180, 160, 440, 190, 6);
  ctx.fill();
  ctx.strokeStyle = '#ff6600';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ff6600';
  ctx.beginPath();
  ctx.roundRect(180, 160, 440, 190, 6);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff6600';
  ctx.font = '8.5px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('📡 TRANSMITTING', W / 2, 208);
  ctx.fillText('SOUND MASTERING REPORT...', W / 2, 238);

  // Progress bar
  ctx.fillStyle = '#111';
  ctx.fillRect(210, 266, 380, 18);
  ctx.fillStyle = prog > 0.5 ? '#ccff00' : '#ff6600';
  ctx.shadowBlur = Math.floor(t / 80) % 2 === 0 ? 8 : 0;
  ctx.shadowColor = ctx.fillStyle;
  ctx.fillRect(210, 266, 380 * prog, 18);
  ctx.shadowBlur = 0;

  const dots = '.'.repeat(Math.floor(elapsed / 350) % 4);
  ctx.fillStyle = '#888';
  ctx.font = '6.5px "Press Start 2P", monospace';
  ctx.fillText(Math.floor(prog * 100) + '%  PROCESSING' + dots, W / 2, 316);

  if (prog >= 1) {
    setTimeout(() => {
      if (game.screen === 'TRANSMITTING') {
        game.screen = 'VICTORY';
        victoryOverlay.classList.add('active');
        playVictory();
      }
    }, 100);
  }
}

  ctx.shadowColor = '#ccff00';
  ctx.fillText('YF&K AI ROCKSTAR', W / 2, 172);
  ctx.fillText('MASTER!', W / 2, 204);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff6600';
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillText('FINAL SCORE: ' + game.totalScore, W / 2, 246);

  ctx.fillStyle = '#fff';
  ctx.font = '6.5px "Press Start 2P", monospace';
  ctx.fillText('ALL 4 LYRIA 3.5 PROMPTS UNLOCKED!', W / 2, 278);

  ctx.fillStyle = '#666';
  ctx.font = '5.5px "Press Start 2P", monospace';
  ctx.fillText('CHALLENGE COMPLETED: "CREATE AN ANTHEM FOR THE TEAM"', W / 2, 305);

  // Zally small
  drawZally(W / 2, 450, 0.88, t);
}

function renderGameplay(ts) {
  drawBackground();
  drawLanes();
  drawTrigger(game.keys);

  // Update + draw notes
  const el = game.gameElapsed;
  game.notes.forEach(n => {
    if (n.hit || n.missed) return;
    const spawnMs = n.hitTime - TRAVEL_MS;
    if (el >= spawnMs) {
      n.spawned = true;
      const prog = (el - spawnMs) / TRAVEL_MS;
      n.x = LANES[n.lane].x;
      n.y = -NOTE_R * 2 + prog * (TRIGGER_Y + NOTE_R * 2 + 30);
      // Check auto-miss
      if (!n.missed && el > n.hitTime + HIT_WINDOW + 100) {
        n.missed = true;
        playMiss();
        game.volumeMix = Math.max(0, game.volumeMix - 0.5);
        game.starPower = Math.max(0, game.starPower - 4);
        game.flashFx = { col: 'rgba(255,0,50,0.25)', a: 0.25 };
        updateHUD();
        if (game.volumeMix <= 0 && !game.levelDone) {
          game.levelDone = true;
          setTimeout(restartLevel, 600);
        }
      }
    }
  });
  drawNotes();
  drawFX();

  // Zally on side
  drawZally(88, 490, 0.72, ts);

  // Timer bar
  const timeLeft = Math.max(0, GAME_DUR - el);
  const tfrac = timeLeft / GAME_DUR;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, 7);
  ctx.fillStyle = tfrac > 0.4 ? '#ccff00' : tfrac > 0.2 ? '#ff6600' : '#ff0033';
  ctx.shadowBlur = tfrac < 0.2 ? 8 : 0;
  ctx.shadowColor = '#ff0033';
  ctx.fillRect(0, 0, W * tfrac, 7);
  ctx.shadowBlur = 0;

  // Check end
  if (el >= GAME_DUR && !game.levelDone) {
    game.levelDone = true;
    setTimeout(levelComplete, 600);
  }
}

// ═══════════════════════════════════════════════
//  GAMEPLAY LOGIC
// ═══════════════════════════════════════════════
function prepareNotes(lvData) {
  game.notes = lvData.notePattern.map(n => ({
    lane: n.l,
    hitTime: n.t,
    x: LANES[n.l].x,
    y: -NOTE_R * 2,
    spawned: false,
    hit: false,
    missed: false,
    hitAnim: 0,
  }));
}

function handleHit(laneIdx) {
  if (game.screen !== 'PLAYING') return;
  const el = game.gameElapsed;
  let best = null, bestDiff = Infinity;
  game.notes.forEach(n => {
    if (!n.spawned || n.hit || n.missed || n.lane !== laneIdx) return;
    const diff = Math.abs(el - n.hitTime);
    if (diff <= HIT_WINDOW && diff < bestDiff) { bestDiff = diff; best = n; }
  });
  if (!best) return;

  best.hit = true;
  best.hitAnim = 0;

  const perfect = bestDiff < 50;
  playHit(perfect);
  const pts = perfect ? 150 : 100;
  game.score += pts;
  game.totalScore += pts;
  game.starPower = Math.min(game.maxStar, game.starPower + 12);
  game.volumeMix = Math.min(game.maxVol, game.volumeMix + 0.25);

  const lane = LANES[laneIdx];
  game.comboText = { txt: perfect ? 'PERFECT!' : 'GOOD!', x: lane.x, y: TRIGGER_Y - 44, col: perfect ? '#ccff00' : '#ff6600', f: 0 };
  game.flashFx = { col: lane.color + '18', a: 0.12 };
  updateHUD();
}

function updateHUD() {
  hudScore.textContent = 'SCORE: ' + game.score;
  hudLevel.textContent = 'LEVEL ' + (game.levelIndex + 1);
  barVolume.style.width = (game.volumeMix / game.maxVol * 100) + '%';
  barStar.style.width = (game.starPower / game.maxStar * 100) + '%';
}

// ═══════════════════════════════════════════════
//  MODAL SYSTEM
// ═══════════════════════════════════════════════
function showQuestion(lvIdx) {
  const lv = LEVELS_DATA[lvIdx];
  game.screen = 'QUESTION';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');

  const opts = lv.options.map((o, i) =>
    `<button class="option-btn" onclick="handleAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</button>`
  ).join('');

  modalContent.innerHTML = `
    <div class="modal-badge">${lv.badge}</div>
    <div class="modal-title">LEVEL ${lv.number}: ${lv.title} — ${lv.subtitle}</div>
    <div class="modal-question">❓ ${lv.question}</div>
    ${opts}
    <div style="font-size:5.5px;color:#444;margin-top:12px;text-align:center;line-height:2;">
      ⚡ Rispondi correttamente per accordare lo strumento e sbloccare il Prompt Perfetto
    </div>
  `;
  overlay.classList.add('active');
}

function handleAnswer(idx) {
  const lv = LEVELS_DATA[game.levelIndex];
  const btns = modalContent.querySelectorAll('.option-btn');
  btns.forEach(b => { b.disabled = true; });

  if (idx === lv.correctIndex) {
    btns[idx].classList.add('correct');
    setTimeout(() => showUnlocked(lv), 300);
  } else {
    btns[idx].classList.add('wrong');
    btns[lv.correctIndex].classList.add('correct');

    const hintEl = document.createElement('div');
    hintEl.className = 'hint-box';
    hintEl.style.whiteSpace = 'pre-line';
    hintEl.textContent = lv.hint;
    modalContent.appendChild(hintEl);

    const retry = document.createElement('button');
    retry.className = 'play-btn';
    retry.style.cssText = 'background:linear-gradient(135deg,#330000,#1a0000);color:#ff4444;margin-top:14px;';
    retry.textContent = '↩ RIPROVA';
    retry.onclick = () => showQuestion(game.levelIndex);
    modalContent.appendChild(retry);
  }
}

function showUnlocked(lv) {
  const promptLines = lv.unlockedPrompt.replace(/\\n/g, '\n');
  modalContent.innerHTML = `
    <div class="modal-badge">✅ RISPOSTA CORRETTA!</div>
    <div class="modal-title" style="color:#ccff00;">STRUMENTO ACCORDATO! 🎸</div>
    <div class="hint-box" style="white-space:pre-line;">${lv.hint}</div>
    <div class="unlock-box">
      <span class="unlock-label">🔓 ${lv.promptLabel}</span>
      <span class="prompt-text" style="white-space:pre-line;">${promptLines}</span>
    </div>
    <div style="font-size:5.5px;color:#666;margin-top:12px;line-height:2;text-align:center;">
      Questo prompt segue le Best Practice ufficiali di Lyria 3.5 — Human in the Loop attivo!
    </div>
    <button class="play-btn" onclick="startGameplay()">🎵 SUONA LA TRACCIA</button>
  `;
}

// ═══════════════════════════════════════════════
//  TRANSITIONS
// ═══════════════════════════════════════════════
function startGameplay() {
  overlay.classList.remove('active');
  hudEl.classList.add('active');
  touchControls.classList.add('active');
  game.screen = 'PLAYING';
  game.score = 0;
  game.volumeMix = 10;
  game.starPower = 0;
  game.levelDone = false;
  game.flashFx = null;
  game.comboText = null;
  game.gameStart = performance.now();
  prepareNotes(LEVELS_DATA[game.levelIndex]);
  updateHUD();
  startBeat();
}

function restartLevel() {
  stopBeat();
  game.flashFx = null;
  game.comboText = null;
  game.screen = 'QUESTION';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');
  showQuestion(game.levelIndex);
}

function levelComplete() {
  stopBeat();
  playLevelComplete();
  game.screen = 'LEVEL_COMPLETE';
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');

  if (game.levelIndex < LEVELS_DATA.length - 1) {
    game.levelIndex++;
    setTimeout(() => showQuestion(game.levelIndex), 2200);
  } else {
    setTimeout(() => {
      game.screen = 'TRANSMITTING';
      game.transmitStart = performance.now();
    }, 2200);
  }
}

function resetGame() {
  stopBeat();
  game.screen = 'MENU';
  game.levelIndex = 0;
  game.score = 0;
  game.totalScore = 0;
  game.starPower = 0;
  game.volumeMix = 10;
  game.notes = [];
  game.levelDone = false;
  game.flashFx = null;
  game.comboText = null;
  overlay.classList.remove('active');
  hudEl.classList.remove('active');
  touchControls.classList.remove('active');
  victoryOverlay.classList.remove('active');
  updateHUD();
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  ctx.clearRect(0, 0, W, H);

  if (game.screen === 'PLAYING') {
    game.gameElapsed = ts - game.gameStart;
  }

  switch (game.screen) {
    case 'MENU':
      renderMenu(ts);
      break;
    case 'QUESTION':
    case 'ANSWER':
      drawBackground();
      drawZally(700, 460, 0.72, ts);
      break;
    case 'PLAYING':
      renderGameplay(ts);
      break;
    case 'LEVEL_COMPLETE':
      renderLevelComplete(ts);
      break;
    case 'TRANSMITTING':
      renderTransmitting(ts);
      break;
    case 'VICTORY':
      renderVictory(ts);
      break;
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (game.keys[e.key]) return;
  game.keys[e.key] = true;

  if (game.screen === 'MENU' && (e.key === 'Enter' || e.key === ' ')) {
    showQuestion(0);
    return;
  }
  if (game.screen === 'PLAYING') {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); handleHit(0); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); handleHit(1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); handleHit(2); }
  }
});

document.addEventListener('keyup', e => { game.keys[e.key] = false; });

// Canvas click (menu start)
canvas.addEventListener('click', () => {
  if (game.screen === 'MENU') showQuestion(0);
});

// Touch hit
function touchHit(laneIdx) {
  handleHit(laneIdx);
  // fake key flash
  const keyMap = ['ArrowLeft', 'ArrowDown', 'ArrowRight'];
  game.keys[keyMap[laneIdx]] = true;
  setTimeout(() => { game.keys[keyMap[laneIdx]] = false; }, 120);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
initParticles();
updateHUD();
requestAnimationFrame(loop);
</script>
